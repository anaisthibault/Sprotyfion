<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Sprotyfion</title>
</head>
<body>
<!--Menu-->
<header>
    <section class="py-3 bg-primary" data-bs-theme="dark">
        <div class="text-center">
            <h1 class="text-light">Le Sprotifion de Ananaïs</p>
            <h2 class="text-light">Enjoy !</p>
        </div>
    </section>
</header>
<!--Menu-->

<section class="container">
    <div class="row py-5">

        <section class="card col-6 px-0 border">
            <div class="card-header py-0 text-light bg-primary rounded-top-3 fs-5">
                <p class="mt-3">Top 10 des Artistes</p>
            </div>
            <div x-data="{ tracks: [] }" x-init="tracks = await chargerTracks(); creerGraphique(tracks)">
                <canvas id="chart"></canvas>
            </div>
        </section>

        <section class="card col-6 px-0 border">
            <div class="card-header py-0 text-light bg-success rounded-top-3 fs-5">
                <p class="mt-3">Distribution des Genres</p>
            </div>
            <div x-data="{ tracks: [] }" x-init="tracks = await chargerTracks(); creerFromage(tracks)">
                <canvas id="sexes"></canvas>
            </div>
        </section>
        
    </div>
        
        <section class="card">
            <div id="albums" class="card-header py-0 bg-info text-light fs-5">
                <p class="mt-3">Liste des Morceaux</p>
            </div>

            <div x-data="{tracks:[], selection: null}" x-init="tracks = await chargerTracks()">
                
                    <table class="table">   
                        <thead>
                            <tr>
                                <th>Titres</th>
                                <th>Album</th>
                                <th>Artiste</th>
                                <th>Durée</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template x-for="track in tracks">
                            <tr>
                                <td x-text="track.name"></td>
                                <td x-text="track.album.name"></td>
                                <td x-text="track.artists[0].name"></td>
                                <td x-data="{
                                    minutes: Math.floor(track.duration_ms /1000 /60),
                                    secondes: Math.floor(track.duration_ms/1000) % 60
                                    }" x-text="minutes + ':' + secondes">
                                </td>
                                <td><!-- Button trigger modal -->
                                    <button type="button" class="btn btn-primary" data-bs-target="#Modal" @click="selection = track" data-bs-toggle="modal">
                                        Détails
                                    </button>
                                </td>
                            </tr>
                            </template>
                        </tbody>
                    </table> 


                <!-- Modal -->
                <div class="modal fade" id="Modal" tabindex="-1" aria-labelledby="ModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-xl">
                        <div class="modal-content">
                            <template x-if="selection">
                                <div>
                                <div class="modal-header">
                                    <h3 class="modal-title" id="ModalLabel">Détails du morceau</h3>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                </div>

                                <div class="modal-body">
                                    <section class="container fs-5">
                                        <div class="row">

                                            <div class="col-4">
                                                <h5 x-text="selection.name"></h5>
                                                <img x-show="selection.album.images"></img>
                                                <p x-text="selection.album.release_date"></p>
                                                <span class="d-inline-flex badge rounded-pill text-bg-success">
                                                    Popularité:
                                                    <p x-text="selection.album.popularity"></p>
                                                </span>
                                            </div>

                                            <div class="col-8">
                                                <h3 x-text="selection.name"></h3>
                                                <h5 class="text-secondary">Preview audio</h5>
                                                <h5 class="text-secondary">Informations sur le morceau</h5>
                                                
                                                <p>Durée</p>
                                                <span class="badge rounded-pill text-bg-primary"
                                                    x-data="{
                                                        minutes: Math.floor(selection.duration_ms /1000 /60),
                                                        secondes: Math.floor(selection.duration_ms/1000) % 60
                                                        }" x-text="minutes + ':' + secondes">>
                                                </span>
                                                <div>
                                                    <p class="d-inline-flex">Popularité</p>
                                                    <p class="d-inline-flex text-end" x-text="selection.popularity"></p>
                                                </div>
                                                <div>
                                                    <p class="d-inline-flex text-end">Numéro de piste</p>
                                                    <p class="d-inline-flex text-end" x-text="selection.track_number"></p>
                                                </div>
                                                <div>
                                                    <p class="d-inline-flex text-end">Explicit</p>
                                                    <p class="d-inline-flex text-end" x-text="selection.explicit"></p>
                                                </div>
                                                <h5 class="text-secondary">Artistes</h5>
                                                <div>
                                                    <p x-text="selection.artist.name"></p>
                                                </div>
                                                <h5 class="text-secondary">Genres</h5>
                                                <div>
                                                    <p class="badge text-bg-secondary" x-text="selection.album.genres"></p>
                                                </div>
                                                <button class="btn btn-success">Ouvrir dans Spotify</button>
                                            </div>

                                        </div>
                                    </section>
                                </div>
                            
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
                                </div>
                                </div>

                            </template>
                        </div>
                    </div>
                </div>
            </div>


            </div>
            </br>
        </section>
</section>


<br>
<footer class="py-2 bg-dark">
    <p class="text-light d-flex justify-content-center">©2026 Anaïs THIBAULT - Webmaster</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script> <!-- Bootstrap JS -->
<script src="script/script.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const myModal = document.getElementById('myModal')
    const myInput = document.getElementById('myInput')

    myModal.addEventListener('shown.bs.modal', () => {
    myInput.selection()
    })
</script>

</body>
</html>
