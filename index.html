<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Sprotyfion</title>
</head>
<body>
<!--Menu-->
<header>
    <section class="py-3 bg-primary" data-bs-theme="dark">
        <div class="text-center">
            <h1 class="text-light">Le Sprotifion de Ananaïs</p>
            <h2 class="text-light">Enjoy !</p>
        </div>
    </section>
</header>
<!--Menu-->

<section class="container">
    <div class="row py-5">

        <section class="card col-6 px-0 border">
            <div class="card-header py-0 text-light bg-primary rounded-top-3 fs-5">
                <p class="mt-3">Top 10 des Artistes</p>
            </div>
            <canvas id="top10">
                <div></div>

            </canvas>
        </section>

        <section class="card col-6 px-0 border">
            <div class="card-header py-0 text-light bg-success rounded-top-3 fs-5">
                <p class="mt-3">Distribution des Genres</p>
            </div>
            <canvas id="genres"></canvas>
        </section>
        
    </div>
        
        <section class="card">
            <div id="albums" class="card-header py-0 bg-info text-light fs-5">
                <p class="mt-3">Liste des Morceaux</p>
            </div>
            </br>

            <div x-data="{tracks:[]}" x-init="await chargerTracks()">
            </div>

            <template x-for="track in tracks">
                <div>
                    <h3 x-text="track.name"></h3>
                    <p x-text="track.artist"></p>
                </div>
            </template>

            <div x-data="{ tracks: []}" x-init="tracks = await charger Tracks(); creerGraphique">
                <canvas id="chart"></canvas>
            </div>

            </br>
        </section>
</section>
<br>
<footer class="py-2 bg-dark">
    <p class="text-light d-flex justify-content-center">©2026 Anaïs THIBAULT - Webmaster</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script> <!-- Bootstrap JS -->
 <script src="script/script.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
<script> src="https://cdn.jsdelivr.net/npm/chart.js"</script>

</body>
</html>
